<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>English Subtitle Generator</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/word-typing-styles.css">
  </head>
  <body>
    <div id="app" class="container">
      <header class="header">
        <div class="header-content">
          <h1>🎬 English Subtitle Generator</h1>
          <p>Convert your videos to subtitled masterpieces</p>
        </div>
      </header>

      <div class="panel">
        <div class="left">
          <div class="video-section">
            <div class="video-wrapper">
              <video id="video" controls crossorigin playsinline></video>
              <div id="subtitle-layer"></div>
            </div>
          </div>

          <div class="upload-section">
            <div class="upload-box">
              <div class="upload-input-group">
                <label for="file" class="file-label">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                  </svg>
                  Choose Video File
                </label>
                <input id="file" type="file" accept="video/*" />
                <span id="file-name" class="file-name"></span>
              </div>
              <div class="button-group">
                <button id="btnUpload" class="btn btn-primary">Generate Subtitles</button>
                <button id="btnExport" class="btn btn-secondary">Export Video</button>
              </div>
            </div>
          </div>
        </div>

        <div class="right">
          <div class="subtitles-panel">
            <h3>📝 Subtitle List</h3>
            <div id="subs-list" class="subs-list-container"></div>
          </div>

          <div class="editor-panel" id="editor">
            <!-- Subtitle Type Section - FIRST -->
            <div class="form-section">
              <h4 class="section-title">🎬 Subtitle Type</h4>
              <div class="form-group">
                <label for="segmentSubtitleType">Display Style for This Subtitle</label>
                <select id="segmentSubtitleType">
                  <option value="full">Full Sentence</option>
                  <option value="typing-word">Typing Effect (Word by Word)</option>
                  <option value="word-type">Word Type (Custom Position)</option>
                  <option value="word-studio">Word Studio (Individual Words)</option>
                </select>
              </div>
              <button id="applyType" class="btn btn-success" style="width: 100%; margin-top: 10px;">✓ Set This Subtitle Type</button>
            </div>

            <!-- Text Section -->
            <div class="form-section">
              <h4 class="section-title">Text Content</h4>
              <div class="form-group">
                <label for="editText">Subtitle Text</label>
                <textarea id="editText" placeholder="Edit subtitle text here..."></textarea>
              </div>
            </div>

            <!-- Word Styling Section (Word Type) -->
            <div class="form-section">
              <h4 class="section-title">🎬 Word Type - Click to Customize</h4>
              <p style="font-size: 0.85em; color: #666; margin: 0 0 10px 0;">Click a word button to customize it in the center of video</p>
              <div id="wordButtonsPanel" class="word-buttons-panel"></div>
              <button id="startCustomizing" class="btn btn-primary" style="width: 100%; margin-top: 10px; display: none;">🎨 Customize All Words</button>
              <button id="doneCustomizing" class="btn btn-success" style="width: 100%; margin-top: 10px; display: none;">✅ Done Customizing - Play Video</button>
              <button id="setCurrentWord" class="btn btn-success" style="width: 100%; margin-top: 10px; display: none;">✓ Save This Word</button>
            </div>

            <!-- Typography Section -->
            <div class="form-section">
              <h4 class="section-title">Typography</h4>
              <div class="form-row">
                <div class="form-group">
                  <label for="fontSelect">Font</label>
                  <select id="fontSelect">
                    <option value="Arial">Arial</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Verdana">Verdana</option>
                    <option value="Trebuchet MS">Trebuchet MS</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="size">Size</label>
                  <input id="size" type="range" min="16" max="200" value="36" />
                  <span id="sizeValue">36</span>px
                </div>
              </div>
              <div class="form-group checkbox">
                <input id="bold" type="checkbox" />
                <label for="bold">Bold Text</label>
              </div>
            </div>

            <!-- Colors Section -->
            <div class="form-section">
              <h4 class="section-title">Colors & Style</h4>
              <div class="form-row">
                <div class="form-group">
                  <label for="color">Text Color</label>
                  <input id="color" type="color" value="#ffffff" />
                </div>
                <div class="form-group">
                  <label for="bgColor">Background</label>
                  <input id="bgColor" type="color" value="#000000" />
                </div>
              </div>
              <div class="form-group">
                <label for="bgOpacity">Background Opacity</label>
                <div class="slider-container">
                  <input id="bgOpacity" type="range" min="0" max="100" value="60" />
                  <span id="bgOpacityValue">60</span>%
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="borderColor">Border Color</label>
                  <input id="borderColor" type="color" value="#ffffff" />
                </div>
                <div class="form-group" id="studioColorGroup" style="display: none;">
                  <label for="studioHighlightColor">Studio Highlight (Active)</label>
                  <input id="studioHighlightColor" type="color" value="#2196F3" />
                </div>
              </div>
              <div class="form-group">
                <label for="borderOpacity">Border Opacity</label>
                <div class="slider-container">
                  <input id="borderOpacity" type="range" min="0" max="100" value="0" />
                  <span id="borderOpacityValue">0</span>%
                </div>
              </div>
            </div>

            <!-- Position Section -->
            <div class="form-section">
              <h4 class="section-title">Position</h4>
              <div class="form-group checkbox">
                <input id="centerToggle" type="checkbox" checked />
                <label for="centerToggle">Center Subtitles</label>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="posX">Position X</label>
                  <div class="slider-container">
                    <input id="posX" type="range" min="0" max="100" value="50" />
                    <span id="posXValue">50</span>%
                  </div>
                </div>
                <div class="form-group">
                  <label for="posY">Position Y</label>
                  <div class="slider-container">
                    <input id="posY" type="range" min="0" max="100" value="50" />
                    <span id="posYValue">50</span>%
                  </div>
                </div>
              </div>
            </div>

            <!-- Actions Section -->
            <div class="form-section">
              <div class="button-group-vertical">
                <button id="apply" class="btn btn-primary">Apply to Current</button>
                <button id="applyAll" class="btn btn-secondary">Apply to All</button>
                <button id="setPosition" class="btn btn-success" style="display: none;">✓ Set Position</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/word-by-word-typing.js"></script>
    <script src="/app.js?v=6"></script>
  </body>
</html>
